# Minimal Debian server image for commercial shipment.
#
# Built with mkosi (https://github.com/systemd/mkosi). Produces a GPT disk
# image (mkosi.output/daydev-server.raw) that boots on both UEFI (via
# systemd-boot) and legacy BIOS (via GRUB), runs systemd, and ships only a
# small set of services plus a hands-on troubleshooting toolkit.
#
# Build locally:   mkosi build          (needs mkosi >= 26)
# Boot to test:    mkosi vm             (opens a QEMU VM)
# See README.md for deployment / flashing instructions.

[Config]
# Fail early on hosts with an mkosi too old to understand these settings.
MinimumVersion=26

[Distribution]
Distribution=debian
# Debian 13 "trixie" (current stable). Pin the release for reproducible builds.
Release=trixie
# Fetch the Debian archive keyring automatically if it is not already present
# on the build host, so bootstrapping works on a clean runner.
RepositoryKeyFetch=yes

[Output]
Format=disk
Output=daydev-server
ImageId=daydev-server
OutputDirectory=mkosi.output

[Build]
# Build the image using a self-contained tools tree instead of whatever
# happens to be installed on the CI runner. This is the maintainer-recommended
# way to get reproducible builds across host distributions.
ToolsTree=default

[Content]
Bootable=yes
# UEFI systems boot via systemd-boot. On x86-64 we additionally install GRUB
# for legacy BIOS boot (see mkosi.conf.d/x86-64.conf); arm64 servers are
# UEFI-only. This keeps the image usable regardless of the target's firmware.
Bootloader=systemd-boot
# Make the serial console usable on headless / IPMI / cloud servers, and skip
# the interactive first-boot setup so unattended boots never block.
KernelCommandLine=console=ttyS0,115200 console=tty0 systemd.firstboot=off

# The kernel and BIOS bootloader packages are architecture-specific and live in
# the per-architecture drop-ins under mkosi.conf.d/.
Packages=
        # --- base system: init, bootloader, DNS ---
        systemd
        systemd-sysv
        systemd-resolved
        systemd-boot-efi
        udev
        dbus-broker
        ca-certificates
        # --- troubleshooting / operations toolkit ---
        htop
        iotop
        iftop
        lsof
        strace
        tcpdump
        iperf3
        dnsutils
        curl
        wget
        less
        vim
        nano
        iproute2
        netcat-openbsd
        traceroute
        mtr-tiny
        rsync
        tar
        gzip
        xz-utils
        zip
        unzip
        openssh-server
        openssh-client
        openssl

[Validation]
# Emit a SHA256SUMS file alongside the image.
Checksum=yes
