# Architecture-specific settings for x86-64 (amd64) servers.
# Adds the amd64 kernel and enables legacy BIOS boot via GRUB in addition to
# the UEFI systemd-boot loader configured in the top-level mkosi.conf.

[Match]
Architecture=x86-64

[Content]
BiosBootloader=grub
Packages=
        linux-image-amd64
        grub-pc-bin
