name: Build server image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      architecture:
        description: Target architecture to build
        type: choice
        default: x86-64
        options:
          - x86-64
          - arm64

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        architecture:
          - ${{ github.event.inputs.architecture || 'x86-64' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU for cross-architecture builds
        if: matrix.architecture != 'x86-64'
        uses: docker/setup-qemu-action@v3

      - name: Set up mkosi
        uses: systemd/mkosi@v26

      - name: Configure root password
        env:
          # Optional: a crypt(3) hash, e.g. from `openssl passwd -6`.
          ROOT_PASSWORD_HASH: ${{ secrets.ROOT_PASSWORD_HASH }}
        run: |
          if [ -n "${ROOT_PASSWORD_HASH:-}" ]; then
            printf 'hashed:%s\n' "$ROOT_PASSWORD_HASH" > mkosi.rootpw
          else
            echo "::warning title=Default root password::No ROOT_PASSWORD_HASH secret set; the image uses the default password 'daydev'. Set the secret (or change the password) before shipping."
            printf 'daydev\n' > mkosi.rootpw
          fi
          chmod 600 mkosi.rootpw

      - name: Install SSH authorized key (optional)
        env:
          # Optional: a public key line to drop into /root/.ssh/authorized_keys.
          SSH_AUTHORIZED_KEY: ${{ secrets.SSH_AUTHORIZED_KEY }}
        run: |
          if [ -n "${SSH_AUTHORIZED_KEY:-}" ]; then
            install -d -m 700 mkosi.extra/root/.ssh
            printf '%s\n' "$SSH_AUTHORIZED_KEY" > mkosi.extra/root/.ssh/authorized_keys
            chmod 600 mkosi.extra/root/.ssh/authorized_keys
          fi

      - name: Build image
        run: mkosi --architecture "${{ matrix.architecture }}" --force build

      - name: Install conversion tools
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            qemu-utils grub-common grub-pc-bin grub-efi-amd64-bin \
            xorriso mtools busybox-static cpio gzip

      - name: Convert to shippable disk formats (img/qcow2/vmdk/vhd/vhdx/ova)
        run: scripts/make-artifacts.sh "${{ matrix.architecture }}"

      - name: Build bootable installer ISO (BIOS + UEFI)
        run: sudo --preserve-env=GITHUB_WORKSPACE scripts/make-installer-iso.sh "${{ matrix.architecture }}"

      - name: Checksums
        run: |
          set -eu
          cd mkosi.output
          rm -f -- *.raw            # the shipped raw is the .img; drop the intermediate
          sha256sum daydev-server-* > SHA256SUMS
          cat SHA256SUMS
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daydev-server-${{ matrix.architecture }}
          path: |
            mkosi.output/daydev-server-*.img
            mkosi.output/daydev-server-*.qcow2
            mkosi.output/daydev-server-*.vmdk
            mkosi.output/daydev-server-*.vhd
            mkosi.output/daydev-server-*.vhdx
            mkosi.output/daydev-server-*.ova
            mkosi.output/daydev-server-*-installer.iso
            mkosi.output/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mkosi.output/daydev-server-*.img
            mkosi.output/daydev-server-*.qcow2
            mkosi.output/daydev-server-*.vmdk
            mkosi.output/daydev-server-*.vhd
            mkosi.output/daydev-server-*.vhdx
            mkosi.output/daydev-server-*.ova
            mkosi.output/daydev-server-*-installer.iso
            mkosi.output/SHA256SUMS
