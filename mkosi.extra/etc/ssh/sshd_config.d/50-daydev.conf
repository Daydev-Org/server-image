# DayDev minimal server SSH policy.
#
# Root login is permitted so a freshly shipped unit can be provisioned over the
# network. Once your own admin account and keys are in place, tighten this:
#
#     PermitRootLogin prohibit-password
#     PasswordAuthentication no
#
PermitRootLogin yes
PubkeyAuthentication yes
PasswordAuthentication yes
KbdInteractiveAuthentication no
X11Forwarding no
